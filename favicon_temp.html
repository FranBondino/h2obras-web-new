<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 256px;
            height: 256px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .container {
            width: 240px;
            height: 240px;
            border: 4px solid #083344;
            /* Dark slate blue */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 20px;
            box-sizing: border-box;
        }

        img {
            width: 60%;
            height: auto;
            /* CSS to ensure it looks like the original logo */
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="logoh2o_new.png" />
    </div>
</body>

</html>
